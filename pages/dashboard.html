<section class="bg-gray-50 py-6">
  <div class="max-w-screen-lg mx-auto px-4 space-y-6">

    <!-- Semester & Subject Select (side by side on md+, stacked on mobile) -->
    <div class="flex flex-col md:flex-row md:items-center md:space-x-4 space-y-4 md:space-y-0">
      
      <!-- Semester Select -->
      <form class="flex-1">
        <select id="semesterSelect" 
                class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-lg 
                       focus:ring-red-900 focus:border-red-900 block p-3 shadow-sm cursor-pointer">
          <option selected disabled>Loading semesters...</option>
        </select>
      </form>

      <!-- Subject Select -->
      <form class="flex-1">
        <select id="subjectSelect" 
                class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-lg 
                       focus:ring-red-900 focus:border-red-900 block p-3 shadow-sm cursor-pointer">
          <option selected disabled>Select a semester first</option>
        </select>
      </form>
    </div>

    <!-- Documents Header + Filter -->
    <div class="flex items-center justify-between">
      <h5 class="text-slate-800 text-lg font-semibold">Documents</h5>
      <div class="flex items-center gap-2">
        <select id="docFilter" 
                class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg 
                       focus:ring-red-900 focus:border-red-900 block p-2 shadow-sm cursor-pointer">
          <option value="all" selected>All</option>
        </select>
      </div>
    </div>

    <!-- Documents List -->
    <div id="documentsList" class="bg-white shadow-sm border border-slate-200 rounded-lg">
      <div class="p-4">
        <div class="divide-y divide-slate-200" id="documentsContainer">
          <div class="text-slate-500 text-center py-3">Select a subject to load documents</div>
        </div>
      </div>
    </div>

  </div>
</section>

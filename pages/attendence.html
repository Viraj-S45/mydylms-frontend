      </div>

        <ul class="flex flex-row font-medium mt-0 rtl:space-x-reverse text-sm">

<section class="max-w-4xl mx-auto px-4 py-6 space-y-6">
  <!-- Overall Attendance -->
  <div class="bg-white shadow-md border border-gray-200 rounded-lg p-6 flex items-center justify-center text-center">
    <div>
      <h2 class="text-3xl font-bold text-red-900">Overall Attendance</h2>
      <p id="overallAttendance" class="text-5xl font-extrabold text-gray-800 mt-2">--%</p>
    </div>
  </div>

  <!-- Detailed Attendance Table -->
  <div class="bg-white shadow-md border border-red-200 rounded-lg p-4">
    <h3 class="text-xl font-semibold mb-4 text-red-900">Detailed Attendance</h3>
    <table class="w-full table-auto border-collapse">
      <thead>
        <tr class="bg-red-50 text-left">
          <th class="px-4 py-2 border-b border-red-200">Subject</th>
          <th class="px-4 py-2 border-b border-red-200">Total Classes</th>
          <th class="px-4 py-2 border-b border-red-200">Present</th>
          <th class="px-4 py-2 border-b border-red-200">Absent</th>
          <th class="px-4 py-2 border-b border-red-200">Percentage</th>
          <th class="px-4 py-2 border-b border-red-200">Details</th>
        </tr>
      </thead>
      <tbody id="detailedAttendanceBody">
        <tr>
          <td colspan="6" class="text-center text-gray-500 py-4">Loading attendance...</td>
        </tr>
      </tbody>
    </table>
  </div>
